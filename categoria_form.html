{% extends 'base.html' %}

{% block title %}Excluir {{ type }} - Izabellaestilo{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger shadow">
            <div class="card-header bg-danger text-white">
                <h3 class="card-title mb-0">Confirmar Exclusão</h3>
            </div>
            <div class="card-body">
                <p class="lead">Tem certeza que deseja excluir o {{ type }}: <strong>{{ object }}</strong>?</p>
                <p class="text-muted">Esta ação não pode ser desfeita.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{% url 'produto_list' %}" class="btn btn-secondary me-md-2">Cancelar</a>
                        <button type="submit" class="btn btn-danger">Sim, Excluir</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
